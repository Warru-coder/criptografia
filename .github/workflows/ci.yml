name: SecureCrypt CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: npm audit production deps (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high
      - name: npm audit full (advisory, devDeps included)
        run: npm audit --audit-level=high || echo "::warning::devDependency vulnerabilities present — see ADR-0007 (pending)"
      - name: Dependency Review (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  test:
    name: Test + Coverage
    runs-on: windows-latest
    needs: [lint, security-audit]
    env:
      NODE_ENV: test
      SESSION_TTL_MINUTES: '30'
      SERVER_SECRET: ci-secret-32-chars-padded-xxxxxxx
      ENABLE_REGISTRATION: 'true'
      ENABLE_WEBAUTHN: 'false'
      ENABLE_AI: 'false'
      LOGIN_RATE_LIMIT_MAX: '100'
      RATE_LIMIT_MAX: '500'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: securecrypt-build
          path: dist/
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: securecrypt:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  package:
    name: Package (tags only)
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - run: npx @yao-pkg/pkg . -t node22-win-x64 -o dist/securecrypt.exe --compress GZip
      - uses: actions/upload-artifact@v4
        with:
          name: securecrypt-win-x64
          path: dist/securecrypt.exe
          retention-days: 30

  release:
    name: GitHub Release (tags only)
    runs-on: windows-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: securecrypt-win-x64
          path: release/
      - uses: softprops/action-gh-release@v3
        with:
          files: release/securecrypt.exe
          generate_release_notes: true
          draft: true
